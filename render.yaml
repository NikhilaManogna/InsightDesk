services:
  - type: web
    name: insightdesk
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address=0.0.0.0 --server.port=$PORT
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: DUCKDB_PATH
        value: ./cache/insightdesk.duckdb
